services:
  # Backend API Runner - pull from Docker Hub
  api-runner:
    image: fuzanwenn/api-runner:latest  # ✅ Use Docker Hub image
    container_name: stock-analyst-api-runner
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BACKEND_IMAGE=fuzanwenn/stock-analyst:latest  # ✅ Use Docker Hub backend
      - DATA_VOLUME=stockdata
    volumes:
      - stockdata:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # Frontend Web Interface
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_RUNNER_URL=http://localhost:8080
    container_name: stock-analyst-web
    ports:
      - "3000:80"
    depends_on:
      - api-runner
    restart: unless-stopped

volumes:
  stockdata:
    driver: local

networks:
  default:
    driver: bridge
