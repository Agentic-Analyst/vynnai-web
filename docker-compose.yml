services:
  api-runner:
    image: fuzanwenn/api-runner:latest
    container_name: stock-analyst-api-runner
    env_file:
      - ../api-runner/.env.dev   # point to the backend dev env, not frontend!
    ports:
      - "8080:8080"
    environment:
      - CORS_ALLOW_ORIGINS=http://localhost:5173,http://localhost:3000
      - CORS_ALLOW_CREDENTIALS=true
      - BACKEND_IMAGE=fuzanwenn/stock-analyst:latest
      - DATA_VOLUME=stockdata
    volumes:
      - stockdata:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_RUNNER_URL=http://localhost:8080     # dev base
    container_name: stock-analyst-web
    ports:
      - "3000:80"
    depends_on:
      - api-runner
    restart: unless-stopped

volumes:
  stockdata:
    driver: local
